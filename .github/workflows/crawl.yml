name: Job Crawler

on:
  schedule:
    # 08:00 and 20:00 UTC = every 12 hours. This is UTC regardless of where
    # you live, adjust the hours to fit your timezone if you want.
    - cron: "0 8,20 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write   # needed so the workflow can commit jobs_found.csv and seen_jobs.json

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run crawler
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
        run: python crawler.py --days 7

      - name: Commit updated jobs_found.csv and seen_jobs.json
        run: |
          git config user.name "job-crawler-bot"
          git config user.email "actions@github.com"
          git add jobs_found.csv seen_jobs.json
          git diff --cached --quiet || git commit -m "Update job results [skip ci]"
          git push
